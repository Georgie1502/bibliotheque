name: Full CI/CD Pipeline

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  # ============ SERVER TESTS ============
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install server dependencies
        working-directory: ./server
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run API unit tests
        working-directory: ./server
        run: |
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term 2>&1 | head -200 || true

      - name: API Code quality check
        working-directory: ./server
        run: |
          pip install pylint
          find app -name "*.py" -type f | xargs pylint --disable=all --enable=E,F || true

  # ============ CLIENT TESTS ============
  client-tests:
    name: Client Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      - name: Run linting
        working-directory: ./client
        run: |
          npm install --save-dev eslint @typescript-eslint/eslint-plugin @typescript-eslint/parser
          npx eslint src/ --ext .ts,.tsx --max-warnings 0 || true

      - name: Type checking
        working-directory: ./client
        run: npx tsc --noEmit || true

      - name: Run unit tests
        working-directory: ./client
        run: npm run test

      - name: Upload coverage
        working-directory: ./client
        run: npm run test:coverage || true

  # ============ BUILD STAGE ============
  build:
    name: Build Docker Images
    needs: [api-tests, client-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - context: ./server
            image: ${{ github.repository }}/bibliotheque-api
            dockerfile: Dockerfile
          - context: ./client
            image: ${{ github.repository }}/bibliotheque-client
            dockerfile: Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============ NOTIFY ON COMPLETION ============
  notify:
    name: Notify CI Completion
    runs-on: ubuntu-latest
    needs: [build]
    if: always()
    steps:
      - name: CI Status
        run: |
          if [ "${{ needs.build.result }}" = "success" ]; then
            echo "✅ CI/CD Pipeline completed successfully"
            exit 0
          else
            echo "❌ CI/CD Pipeline failed"
            exit 1
          fi

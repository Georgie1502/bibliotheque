name: Build and Publish Client Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "client/**"
      - ".github/workflows/docker-publish-client.yml"
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/bibliotheque-client

jobs:
  test-and-lint:
    name: Test and Lint Client
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: ./client
        run: npm i

      - name: Run linting (ESLint)
        working-directory: ./client
        run: |
          npm install --save-dev eslint @typescript-eslint/eslint-plugin @typescript-eslint/parser
          npx eslint src/ --ext .ts,.tsx --max-warnings 0 || true

      - name: Type check
        working-directory: ./client
        run: npm run build 2>&1 | head -100 || true

      - name: Run unit tests
        working-directory: ./client
        run: npm run test

      - name: Generate coverage report
        working-directory: ./client
        run: npm run test:coverage || true

  build-and-push:
    name: Build and Push Docker Image
    needs: test-and-lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
